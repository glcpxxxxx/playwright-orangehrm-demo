name: Playwright Tests

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:           # lets you run manually from UI

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30        # fail-safe if tests hang

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest pytest-playwright
          pip install -r requirements.txt

      - name: Install browsers
        run: playwright install --with-deps chromium

      - name: Run all tests
        run: pytest

      - name: List output folders
        if: always()
        run: ls -la

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/
          retention-days: 7
